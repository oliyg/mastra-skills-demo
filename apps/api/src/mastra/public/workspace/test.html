<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明月几时有 - 诗歌欣赏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #f8f5f0;
            --color-text: #2c3e50;
            --color-accent: #8b4513;
            --color-secondary: #7d8b99;
            --color-border: #e0d6c9;
            --font-serif: 'Noto Serif SC', serif;
            --font-calligraphy: 'Ma Shan Zheng', cursive;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-serif);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(232, 227, 217, 0.3) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(232, 227, 217, 0.3) 0%, transparent 20%);
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 3rem;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--color-border);
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-accent), #d4a574, var(--color-accent));
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--color-border);
        }
        
        .title {
            font-family: var(--font-calligraphy);
            font-size: 3rem;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: var(--color-secondary);
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .poem-container {
            position: relative;
            padding: 2rem;
            background: #fefcf9;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            margin-bottom: 2rem;
        }
        
        .poem-container::before {
            content: "「";
            position: absolute;
            top: -1.5rem;
            left: -1rem;
            font-family: var(--font-calligraphy);
            font-size: 5rem;
            color: rgba(139, 69, 19, 0.1);
            z-index: 0;
        }
        
        .poem-container::after {
            content: "」";
            position: absolute;
            bottom: -2.5rem;
            right: -1rem;
            font-family: var(--font-calligraphy);
            font-size: 5rem;
            color: rgba(139, 69, 19, 0.1);
            z-index: 0;
        }
        
        .poem {
            font-size: 1.8rem;
            line-height: 2.2;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        .poem-line {
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }
        
        .poem-line:hover {
            transform: translateX(5px);
            color: var(--color-accent);
        }
        
        .poem-line:last-child {
            margin-bottom: 0;
        }
        
        .author {
            text-align: right;
            font-size: 1.2rem;
            color: var(--color-secondary);
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--color-border);
            font-style: italic;
        }
        
        .author-name {
            color: var(--color-accent);
            font-weight: 600;
        }
        
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-border);
            color: var(--color-secondary);
            font-size: 0.9rem;
        }
        
        .decoration {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            opacity: 0.7;
        }
        
        .decoration-item {
            width: 12px;
            height: 12px;
            background: var(--color-accent);
            border-radius: 50%;
            transform: rotate(45deg);
        }
        
        .decoration-item:nth-child(2) {
            background: var(--color-secondary);
        }
        
        .decoration-item:nth-child(3) {
            background: #d4a574;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .container {
                padding: 2rem 1.5rem;
            }
            
            .title {
                font-size: 2.2rem;
            }
            
            .poem {
                font-size: 1.5rem;
                line-height: 2;
            }
            
            .poem-container {
                padding: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 1.8rem;
            }
            
            .poem {
                font-size: 1.3rem;
            }
            
            .poem-container::before,
            .poem-container::after {
                display: none;
            }
        }
        
        /* 淡入动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container {
            animation: fadeInUp 0.8s ease-out;
        }
        
        .poem-line {
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: both;
        }
        
        .poem-line:nth-child(1) { animation-delay: 0.2s; }
        .poem-line:nth-child(2) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">明月几时有</h1>
            <p class="subtitle">古典诗歌欣赏 · 宋词选</p>
        </div>
        
        <div class="poem-container">
            <div class="poem">
                <div class="poem-line">明月几时有？把酒问青天。</div>
                <div class="poem-line">不知天上宫阙，今夕是何年。</div>
            </div>
        </div>
        
        <div class="author">
            —— 选自 <span class="author-name">苏轼《水调歌头》</span>
        </div>
        
        <div class="footer">
            <p>古典文学 · 诗意生活</p>
            <div class="decoration">
                <div class="decoration-item"></div>
                <div class="decoration-item"></div>
                <div class="decoration-item"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 简单的交互效果
        document.addEventListener('DOMContentLoaded', function() {
            const poemLines = document.querySelectorAll('.poem-line');
            
            poemLines.forEach(line => {
                line.addEventListener('click', function() {
                    this.style.transform = 'scale(1.05)';
                    this.style.color = '#8b4513';
                    
                    setTimeout(() => {
                        this.style.transform = '';
                        this.style.color = '';
                    }, 500);
                });
            });
            
            // 添加页面加载后的微交互
            setTimeout(() => {
                document.querySelector('.container').style.boxShadow = '0 15px 40px rgba(0, 0, 0, 0.12)';
            }, 800);
        });
    </script>
</body>
</html>
