<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单待办事项列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        #todoInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        
        #todoInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        #addBtn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        #addBtn:active {
            transform: translateY(0);
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 14px;
            color: #666;
        }
        
        .stats span {
            font-weight: 600;
            color: #667eea;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .filter-btn:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
        }
        
        #todoList {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        #todoList::-webkit-scrollbar {
            width: 6px;
        }
        
        #todoList::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        #todoList::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        .todo-item {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .todo-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }
        
        .todo-item.completed {
            opacity: 0.7;
            background: #f9f9f9;
        }
        
        .todo-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            word-break: break-word;
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
        }
        
        .delete-btn:hover {
            background: #ff5252;
            transform: scale(1.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }
        
        .instructions {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #888;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .input-section {
                flex-direction: column;
            }
            
            #addBtn {
                justify-content: center;
            }
            
            .filter-buttons {
                flex-direction: column;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-tasks"></i> 待办事项</h1>
        
        <div class="input-section">
            <input type="text" id="todoInput" placeholder="输入新的待办事项..." autocomplete="off">
            <button id="addBtn">
                <i class="fas fa-plus"></i> 添加
            </button>
        </div>
        
        <div class="stats">
            <div>总计: <span id="totalCount">0</span></div>
            <div>已完成: <span id="completedCount">0</span></div>
            <div>未完成: <span id="pendingCount">0</span></div>
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="pending">未完成</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>
        
        <ul id="todoList">
            <!-- 待办事项将在这里动态添加 -->
        </ul>
        
        <div class="instructions">
            <p><i class="fas fa-lightbulb"></i> 提示: 点击复选框标记完成，点击删除按钮移除事项</p>
        </div>
    </div>

    <script>
        // 从本地存储加载待办事项，如果没有则使用示例数据
        let todos = JSON.parse(localStorage.getItem('todos')) || [
            { id: 1, text: '学习 JavaScript', completed: false },
            { id: 2, text: '完成项目设计', completed: true },
            { id: 3, text: '购买生活用品', completed: false },
            { id: 4, text: '阅读一本书', completed: false }
        ];
        
        let currentFilter = 'all';
        
        // DOM 元素
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const totalCount = document.getElementById('totalCount');
        const completedCount = document.getElementById('completedCount');
        const pendingCount = document.getElementById('pendingCount');
        
        // 初始化
        function init() {
            renderTodos();
            updateStats();
            setupEventListeners();
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 添加待办事项
            addBtn.addEventListener('click', addTodo);
            todoInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTodo();
            });
            
            // 筛选按钮
            filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderTodos();
                });
            });
        }
        
        // 添加待办事项
        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) {
                todoInput.focus();
                return;
            }
            
            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            todos.unshift(newTodo);
            saveTodos();
            renderTodos();
            updateStats();
            
            // 清空输入框并聚焦
            todoInput.value = '';
            todoInput.focus();
            
            // 显示添加成功动画
            addBtn.innerHTML = '<i class="fas fa-check"></i> 已添加';
            addBtn.style.background = 'linear-gradient(45deg, #4CAF50, #2E7D32)';
            
            setTimeout(() => {
                addBtn.innerHTML = '<i class="fas fa-plus"></i> 添加';
                addBtn.style.background = 'linear-gradient(45deg, #667eea, #764ba2)';
            }, 1000);
        }
        
        // 切换待办事项完成状态
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                updateStats();
            }
        }
        
        // 删除待办事项
        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
            updateStats();
        }
        
        // 保存到本地存储
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }
        
        // 渲染待办事项列表
        function renderTodos() {
            // 根据筛选条件过滤待办事项
            let filteredTodos = todos;
            if (currentFilter === 'pending') {
                filteredTodos = todos.filter(todo => !todo.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(todo => todo.completed);
            }
            
            if (filteredTodos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-clipboard-list"></i>
                        <h3>暂无待办事项</h3>
                        <p>${currentFilter === 'all' ? '点击上方"添加"按钮创建第一个待办事项' : 
                           currentFilter === 'pending' ? '没有未完成的待办事项' : 
                           '没有已完成的待办事项'}</p>
                    </div>
                `;
                return;
            }
            
            todoList.innerHTML = filteredTodos.map(todo => `
                <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}>
                    <span class="todo-text">${todo.text}</span>
                    <button class="delete-btn" title="删除">
                        <i class="fas fa-trash"></i>
                    </button>
                </li>
            `).join('');
            
            // 为每个待办事项添加事件监听器
            document.querySelectorAll('.todo-item').forEach(item => {
                const id = parseInt(item.dataset.id);
                const checkbox = item.querySelector('.todo-checkbox');
                const deleteBtn = item.querySelector('.delete-btn');
                
                checkbox.addEventListener('click', () => toggleTodo(id));
                deleteBtn.addEventListener('click', () => deleteTodo(id));
            });
        }
        
        // 更新统计信息
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            const pending = total - completed;
            
            totalCount.textContent = total;
            completedCount.textContent = completed;
            pendingCount.textContent = pending;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
